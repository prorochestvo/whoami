name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "these files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: vet
        run: CGO_ENABLED=0 go vet ./...

      - name: test
        run: CGO_ENABLED=0 go test ./...

      - name: build site
        env:
          # the built-in token only raises the GitHub API rate limit; a failed
          # fetch still degrades gracefully, so the build never depends on it.
          WHOAMI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: CGO_ENABLED=0 go run ./cmd/whoami
